{% extends 'base.html' %}
{% block title %}Find Jobs{% endblock %}
{% block content %}
<div class="container">
    <h2 style="margin-bottom:1rem">Available Jobs</h2>
    {% for job in jobs %}
        <div class="card" style="margin-bottom:1rem">
            <strong>{{ job.title }}</strong> — {{ job.city }}
            <a href="{% url 'apply_to_job' job.id %}" class="btn btn-primary btn-sm" style="margin-left:1rem">Apply</a>
        </div>
    {% empty %}
        <p>No jobs found.</p>
    {% endfor %}
</div>
{% endblock %}
